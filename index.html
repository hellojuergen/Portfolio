<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jürgen Nigg — Fotografie, Artwork & Design Portfolio">
    <meta name="author" content="Jürgen Nigg">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Jürgen Nigg – Portfolio">
    <meta property="og:description" content="Fotografie, Artwork & Design">
    <title>Jürgen Nigg – Portfolio</title>
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="assets/img/logo-white.png" alt="yooneek" class="logo-img">
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">Portfolio</a>
                <a href="wallpapers.html" class="nav-link nav-link-cta"><i class="fas fa-download"></i> Wallpapers</a>
            </div>
        </div>
    </nav>

    <!-- Portfolio Grid -->
    <section class="portfolio-section" id="works">
        <div class="container">
            <div class="masonry-grid" id="portfolio-grid"></div>
            <div class="load-more-container">
                <button class="btn-load-more" id="load-more-btn">Load More</button>
            </div>
        </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close"><i class="fas fa-times"></i></button>
        <button class="lightbox-prev" id="lightbox-prev"><i class="fas fa-chevron-left"></i></button>
        <button class="lightbox-next" id="lightbox-next"><i class="fas fa-chevron-right"></i></button>
        <div class="lightbox-content">
            <img src="" alt="" id="lightbox-img">
            <div class="lightbox-info">
                <p id="lightbox-subtitle"></p>
                <h3 id="lightbox-title"></h3>
                <div id="lightbox-meta"></div>
                <div class="lightbox-divider"></div>
                <p id="lightbox-description"></p>
            </div>
        </div>
    </div>

    <!-- Social Sidebar -->
    <div class="social-sidebar">
        <a href="https://www.instagram.com/juergennigg/" target="_blank" rel="noopener noreferrer" class="social-icon" title="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="https://www.behance.net/jrgennigg" target="_blank" rel="noopener noreferrer" class="social-icon" title="Behance"><i class="fab fa-behance"></i></a>
        <a href="https://www.linkedin.com/in/juergennigg" target="_blank" rel="noopener noreferrer" class="social-icon" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-bottom">
            <p id="contact-mail"></p>
            <p>&copy; 2026 Jürgen Nigg. Alle Rechte vorbehalten.</p>
        </div>
    </footer>

    <script>
        var u='hello',d='juergennigg.com',el=document.getElementById('contact-mail');
        if(el){var a=document.createElement('a');a.href='mailto:'+u+'@'+d;a.textContent=u+'@'+d;a.style.color='#666';el.appendChild(a);}
    </script>
    <script src="js/portfolio-data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
