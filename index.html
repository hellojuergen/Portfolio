<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio – Fotografie & Design">
    <meta name="author" content="Jürgen">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Portfolio">
    <meta property="og:description" content="Fotografie & Design">
    <meta property="og:image" content="./assets/img/portfolio/social-preview.jpg">

    <title>Jürgen Nigg – Portfolio</title>

    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:;">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <!-- Logo -->
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <div class="logo-circle">J</div>
            </a>
        </div>
    </nav>

    <!-- Portfolio Grid -->
    <section class="portfolio-section">
        <div class="container">
            <div class="masonry-grid" id="portfolio-grid"></div>
            <div class="load-more-container">
                <button class="btn-load-more">Load More</button>
            </div>
        </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">
            <i class="fas fa-times"></i>
        </button>
        <button class="lightbox-prev" id="lightbox-prev">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="lightbox-next" id="lightbox-next">
            <i class="fas fa-chevron-right"></i>
        </button>
        <div class="lightbox-content">
            <img src="" alt="" id="lightbox-img">
            <div class="lightbox-info">
                <h3 id="lightbox-title"></h3>
                <p id="lightbox-description"></p>
                <span id="lightbox-date"></span>
            </div>
        </div>
    </div>

    <!-- Social Sidebar -->
    <div class="social-sidebar">
        <a href="https://www.behance.net/yourprofile" target="_blank" rel="noopener noreferrer" class="social-icon" title="Behance">
            <i class="fab fa-behance"></i>
        </a>
        <a href="https://instagram.com/yourprofile" target="_blank" rel="noopener noreferrer" class="social-icon" title="Instagram">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="https://pinterest.com/yourprofile" target="_blank" rel="noopener noreferrer" class="social-icon" title="Pinterest">
            <i class="fab fa-pinterest"></i>
        </a>
        <a href="https://linkedin.com/in/yourprofile" target="_blank" rel="noopener noreferrer" class="social-icon" title="LinkedIn">
            <i class="fab fa-linkedin"></i>
        </a>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-bottom">
            <p id="contact-mail" style="margin-bottom:0.4rem;"></p>
            <p>&copy; 2026 Jürgen Nigg. Alle Rechte vorbehalten.</p>
        </div>
    </footer>

    <script>
        // E-Mail bot-geschützt (nicht im Klartext im HTML)
        const u = 'hello', d = 'juergennigg.com';
        const el = document.getElementById('contact-mail');
        if (el) {
            const link = document.createElement('a');
            link.href = 'mailto:' + u + '@' + d;
            link.textContent = u + '@' + d;
            link.style.color = 'var(--text-gray)';
            el.appendChild(link);
        }
    </script>

    <script src="./js/portfolio-data.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
