<!DOCTYPE html>

    <title>Portfolio Test</title>
    <link rel="stylesheet" href="./css/style.css">

<body>
    <section class="portfolio-section">
        <div class="container">
            <h1 style="text-align: center; color: white; margin-bottom: 2rem;">Portfolio</h1>
            
            <!-- Masonry Grid -->
            <div class="masonry-grid" id="portfolio-grid">
                <!-- Items werden dynamisch geladen -->
            </div>

            <!-- Load More Button -->
            <div class="load-more-container">
                <button class="btn-load-more">Load More</button>
            </div>
        </div>
    </section>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">
            <i class="fas fa-times"></i>✕
        </button>
        <button class="lightbox-prev" id="lightbox-prev">
            <i class="fas fa-chevron-left"></i>‹
        </button>
        <button class="lightbox-next" id="lightbox-next">
            <i class="fas fa-chevron-right"></i>›
        </button>
        <div class="lightbox-content">
            <img src="" alt="" id="lightbox-img">
            <div class="lightbox-info">
                <h3 id="lightbox-title"></h3>
                <p id="lightbox-description"></p>
                <div class="lightbox-meta">
                    <span id="lightbox-category"></span>
                    <span id="lightbox-date"></span>
                </div>
            </div>
        </div>
    </div>
